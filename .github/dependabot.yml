version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "wallstop"
    reviewers:
      - "wallstop"
    commit-message:
      prefix: "chore(ci)"
    groups:
      ci-runtime-actions:
        patterns:
          - "actions/checkout"
          - "actions/setup-node"
          - "actions/setup-go"
      other-github-actions:
        patterns:
          - "*"
        exclude-patterns:
          - "actions/checkout"
          - "actions/setup-node"
          - "actions/setup-go"
    open-pull-requests-limit: 5

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "wallstop"
    reviewers:
      - "wallstop"
    commit-message:
      prefix: "chore(ci)"
    allow:
      - dependency-type: "all"
    groups:
      go-modules:
        applies-to: "version-updates"
        patterns:
          - "*"
    open-pull-requests-limit: 5

  - package-ecosystem: "gomod"
    directory: "/tools/actionlint"
    schedule:
      interval: "weekly"
    assignees:
      - "wallstop"
    reviewers:
      - "wallstop"
    commit-message:
      prefix: "chore(ci)"
    open-pull-requests-limit: 5
