name: Require current pull request head
description: Fail closed when a pull request run no longer targets the pull request's current head SHA.
inputs:
  github-token:
    description: GitHub token with pull request read access. Required whenever PR inputs are supplied.
    required: false
  pull-request-number:
    description: Pull request number from the triggering event. Leave empty only when no PR is in scope.
    required: false
  expected-head-sha:
    description: Pull request head SHA captured by the triggering event. Leave empty only when no PR is in scope.
    required: false
outputs:
  is-current:
    description: Whether this run is current. Events without PR inputs report true without an API call.
  current-head-sha:
    description: Current pull request head SHA, or empty when no pull request is in scope.
runs:
  using: node24
  main: ../../dist/require-current-pr-head.js
