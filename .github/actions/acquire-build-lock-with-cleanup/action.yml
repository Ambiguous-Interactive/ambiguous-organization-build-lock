name: Acquire build lock with post cleanup
description: Acquire a central organization build lock and register best-effort post cleanup.
inputs:
  lock-name:
    description: Lock name. Use wallstop-organization-builds for Unity.
    required: true
  holder-id-suffix:
    description: Extra identity for matrix cells inside the same workflow job.
    required: false
    default: default
  runner-id:
    description: Stable physical runner identity. Required when runner serialization is activated.
    required: false
  lock-repository:
    description: Repository that stores lock state.
    required: false
    default: Ambiguous-Interactive/ambiguous-organization-build-lock
  state-branch:
    description: Branch that stores lock state JSON files.
    required: false
    default: lock-state
  timeout-minutes:
    description: Maximum time to wait for the lock.
    required: false
    default: "180"
  lease-minutes:
    description: Stale-holder lease duration.
    required: false
    default: "240"
  poll-seconds:
    description: Base polling delay while queued.
    required: false
    default: "15"
  require-resource-lifecycle:
    description: Fail unless the loaded lock config has resource lifecycle protection enabled.
    required: false
    default: "false"
  minimum-release-cooldown-seconds:
    description: Fail unless the loaded lock config's release cooldown is at least this many seconds.
    required: false
    default: "0"
outputs:
  acquired:
    description: "true when this action acquired the lock."
  lock-name:
    description: Acquired lock name.
  holder-id:
    description: Unique holder identity for this run.
  state-sha:
    description: Lock-state file SHA after acquire.
  wait-ms:
    description: Milliseconds waited before acquiring.
  attempts:
    description: CAS attempts.
  stale-recovered:
    description: "true when this acquire accepted a stale-holder replacement write."
  quarantine-recovered:
    description: "true when this acquire atomically reclaimed a quarantine on the same physical runner."
runs:
  using: node24
  main: ../../dist/acquire-with-cleanup.js
  post: ../../dist/post-cleanup.js
