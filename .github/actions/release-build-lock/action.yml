name: Release build lock
description: Release a central organization build lock after licensed work.
inputs:
  lock-name:
    description: Lock name. Use wallstop-organization-builds for Unity.
    required: true
  holder-id-suffix:
    description: Extra identity for matrix cells inside the same workflow job.
    required: false
    default: default
  holder-id:
    description: Exact acquire holder-id to clean and report. If unavailable, reconstruct <repository>:<run-id>:<source-job-id>:<holder-id-suffix>. Targets must belong to the current repository and workflow run.
    required: false
  runner-id:
    description: Physical identity of the runner executing cleanup. Required when runner serialization is active.
    required: false
  resource-safe:
    description: "Set true only when external resource cleanup was confirmed; false creates a quarantine under schema 4."
    required: false
    default: "false"
  lock-repository:
    description: Repository that stores lock state.
    required: false
    default: Ambiguous-Interactive/ambiguous-organization-build-lock
  state-branch:
    description: Branch that stores lock state JSON files.
    required: false
    default: lock-state
outputs:
  released:
    description: "true when this action released a held lock."
  queue-cleaned:
    description: "true when this action removed this run from the wait queue."
  cleanup-result:
    description: "cooldown-started, quarantined, released (pre-schema-4), queue-cleaned, or noop."
  lock-name:
    description: Target lock name.
  holder-id:
    description: Unique holder identity for this run.
  state-sha:
    description: Observed or written lock-state file SHA after cleanup.
  held-by:
    description: Holder identity when another run still holds the lock.
  held-by-run-url:
    description: Holder workflow run URL when another run still holds the lock.
  reservation-id:
    description: Opaque lifecycle reservation created when holder ownership is removed.
  reservation-state:
    description: cooldown or quarantine when a lifecycle reservation was created.
  available-at:
    description: Earliest availability time for a cooldown reservation.
runs:
  using: node24
  main: ../../dist/release.js
