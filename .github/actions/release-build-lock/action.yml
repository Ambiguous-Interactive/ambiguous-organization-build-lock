name: Release build lock
description: Release a central organization build lock after licensed work.
inputs:
  lock-name:
    description: Lock name. Use wallstop-organization-builds for Unity.
    required: true
  holder-id-suffix:
    description: Extra identity for matrix cells inside the same workflow job.
    required: false
    default: default
  runner-id:
    description: Stable physical runner identity. Pass the same value used by acquire.
    required: false
  lock-repository:
    description: Repository that stores lock state.
    required: false
    default: Ambiguous-Interactive/ambiguous-organization-build-lock
  state-branch:
    description: Branch that stores lock state JSON files.
    required: false
    default: lock-state
outputs:
  released:
    description: "true when this action released a held lock."
  queue-cleaned:
    description: "true when this action removed this run from the wait queue."
  cleanup-result:
    description: "released, queue-cleaned, or noop."
  lock-name:
    description: Target lock name.
  holder-id:
    description: Unique holder identity for this run.
  state-sha:
    description: Observed or written lock-state file SHA after cleanup.
  held-by:
    description: Holder identity when another run still holds the lock.
  held-by-run-url:
    description: Holder workflow run URL when another run still holds the lock.
runs:
  using: node24
  main: ../../dist/release.js
