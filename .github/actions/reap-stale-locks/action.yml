name: Reap stale build locks
description: Clear stale holders and completed queue entries from a build lock.
inputs:
  lock-name:
    description: Lock name to inspect.
    required: true
  lock-repository:
    description: Repository that stores lock state.
    required: false
    default: Ambiguous-Interactive/ambiguous-organization-build-lock
  state-branch:
    description: Branch that stores lock state JSON files.
    required: false
    default: lock-state
  operation:
    description: "reap, or recover to move an exact quarantine reservation into cooldown."
    required: false
    default: reap
  reservation-id:
    description: Exact opaque quarantine reservation ID required for recovery.
    required: false
  resource-safe:
    description: Explicit external resource cleanup confirmation required for recovery.
    required: false
    default: "false"
outputs:
  reaped:
    description: "true when stale state was handled or a reservation recovery completed."
  state-sha:
    description: Lock-state file SHA after reaping.
runs:
  using: node24
  main: ../../dist/reap.js
