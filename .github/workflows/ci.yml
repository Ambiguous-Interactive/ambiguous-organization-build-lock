name: Build lock CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate lock action files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check JavaScript syntax
        run: |
          for action_file in .github/dist/*.js; do
            node --check "${action_file}"
          done
          for test_file in test/*.test.js; do
            node --check "${test_file}"
          done

      - name: Lint GitHub Actions workflows
        shell: bash
        run: |
          set -euo pipefail
          go run -mod=readonly github.com/rhysd/actionlint/cmd/actionlint -color

      - name: Run fast action tests
        run: node --test test/*.test.js
