name: Build lock CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate lock action files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Check JavaScript syntax
        run: |
          for action_file in .github/dist/*.js; do
            node --check "${action_file}"
          done
          for test_file in test/*.test.js; do
            node --check "${test_file}"
          done

      - name: Lint GitHub Actions workflows
        shell: bash
        run: |
          set -euo pipefail
          go run -mod=readonly github.com/rhysd/actionlint/cmd/actionlint -color

      - name: Run fast action tests
        run: node --test test/*.test.js

      - name: Run Go tests
        run: go test ./...

      - name: Verify Go modules are tidy
        run: go mod tidy -diff

      - name: Reject credential-shaped workflow env literals
        run: go run ./cmd/workflow-credential-audit .
