name: Build lock CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate lock action files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check JavaScript syntax
        run: |
          for action_file in .github/dist/*.js; do
            node --check "${action_file}"
          done
          for test_file in test/*.test.js; do
            node --check "${test_file}"
          done

      - name: Lint GitHub Actions workflows
        shell: bash
        run: |
          set -euo pipefail
          version="1.7.12"
          expected_sha256="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          archive="actionlint_${version}_linux_amd64.tar.gz"
          checksums="actionlint_${version}_checksums.txt"
          install_dir="$(mktemp -d "${RUNNER_TEMP}/actionlint.XXXXXX")"

          curl --fail --show-error --silent --location --retry 3 --retry-delay 2 \
            --output "${RUNNER_TEMP}/${archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${version}/${archive}"
          curl --fail --show-error --silent --location --retry 3 --retry-delay 2 \
            --output "${RUNNER_TEMP}/${checksums}" \
            "https://github.com/rhysd/actionlint/releases/download/v${version}/${checksums}"
          grep -Fx "${expected_sha256}  ${archive}" "${RUNNER_TEMP}/${checksums}" > /dev/null
          printf '%s  %s\n' "${expected_sha256}" "${RUNNER_TEMP}/${archive}" | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${install_dir}" actionlint
          test -x "${install_dir}/actionlint"
          "${install_dir}/actionlint" -color

      - name: Run fast action tests
        run: node --test test/*.test.js
