name: Build lock CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate lock action files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check JavaScript syntax
        run: |
          for action_file in .github/dist/*.js; do
            node --check "${action_file}"
          done
          for test_file in test/*.test.js; do
            node --check "${test_file}"
          done

      - name: Lint GitHub Actions workflows
        shell: bash
        run: |
          set -euo pipefail
          go run -mod=readonly github.com/rhysd/actionlint/cmd/actionlint -color

      - name: Run fast action tests
        run: node --test test/*.test.js

      - name: Run enrollment policy tests
        run: |
          go mod tidy -diff
          go test ./...
